---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-init
  namespace: vault
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vault-init
  namespace: vault
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vault-init
  namespace: vault
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: vault-init
subjects:
  - kind: ServiceAccount
    name: vault-init
    namespace: vault
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-init-script
  namespace: vault
data:
  init.sh: |
    #!/bin/sh
    set -e

    echo "=== Vault Initialization and Unsealing Script ==="

    # Wait for vault-0 pod to exist and be running (not necessarily ready)
    echo "Waiting for vault-0 pod to be running..."
    while [ "$(oc get pod vault-0 -n vault -o jsonpath='{.status.phase}' 2>/dev/null)" != "Running" ]; do
      echo "vault-0 pod not running yet, waiting..."
      sleep 5
    done

    # Wait for Vault process to be responsive (even if sealed/uninitialized)
    echo "Waiting for Vault process to be responsive..."
    while true; do
      if oc exec vault-0 -n vault -- vault status 2>/dev/null | grep -q "Seal Type"; then
        echo "Vault process is responsive"
        break
      fi
      echo "Vault process not responsive yet, waiting..."
      sleep 5
    done

    # Check if Vault is already initialized
    if oc exec vault-0 -n vault -- vault status 2>&1 | grep -q "Initialized.*true"; then
      echo "Vault is already initialized"
      ALREADY_INITIALIZED=true
    else
      echo "Vault is not initialized, proceeding with initialization"
      ALREADY_INITIALIZED=false
    fi

    # Initialize Vault if not already initialized
    if [ "$ALREADY_INITIALIZED" = "false" ]; then
      echo "Initializing Vault..."
      INIT_OUTPUT=$(oc exec vault-0 -n vault -- vault operator init -key-shares=5 -key-threshold=3)

      # Extract unseal keys and root token from text output
      UNSEAL_KEY_1=$(echo "$INIT_OUTPUT" | grep "Unseal Key 1:" | awk '{print $NF}')
      UNSEAL_KEY_2=$(echo "$INIT_OUTPUT" | grep "Unseal Key 2:" | awk '{print $NF}')
      UNSEAL_KEY_3=$(echo "$INIT_OUTPUT" | grep "Unseal Key 3:" | awk '{print $NF}')
      UNSEAL_KEY_4=$(echo "$INIT_OUTPUT" | grep "Unseal Key 4:" | awk '{print $NF}')
      UNSEAL_KEY_5=$(echo "$INIT_OUTPUT" | grep "Unseal Key 5:" | awk '{print $NF}')
      ROOT_TOKEN=$(echo "$INIT_OUTPUT" | grep "Initial Root Token:" | awk '{print $NF}')

      echo "Storing unseal keys and root token in Kubernetes secret..."
      oc create secret generic vault-unseal-keys -n vault \
        --from-literal=unseal-key-1="$UNSEAL_KEY_1" \
        --from-literal=unseal-key-2="$UNSEAL_KEY_2" \
        --from-literal=unseal-key-3="$UNSEAL_KEY_3" \
        --from-literal=unseal-key-4="$UNSEAL_KEY_4" \
        --from-literal=unseal-key-5="$UNSEAL_KEY_5" \
        --from-literal=root-token="$ROOT_TOKEN" \
        --dry-run=client -o yaml | oc apply -f -

      echo "Vault initialized successfully!"
    fi

    # Retrieve unseal keys from secret
    echo "Retrieving unseal keys from secret..."
    if ! oc get secret vault-unseal-keys -n vault >/dev/null 2>&1; then
      echo "ERROR: Vault is already initialized, but vault-unseal-keys secret does not exist!"
      echo "This means Vault was initialized outside of this job."
      echo "Please either:"
      echo "  1. Manually unseal Vault using the original unseal keys"
      echo "  2. Delete and recreate the Vault installation to re-initialize"
      exit 1
    fi

    UNSEAL_KEY_1=$(oc get secret vault-unseal-keys -n vault -o jsonpath='{.data.unseal-key-1}' | base64 -d)
    UNSEAL_KEY_2=$(oc get secret vault-unseal-keys -n vault -o jsonpath='{.data.unseal-key-2}' | base64 -d)
    UNSEAL_KEY_3=$(oc get secret vault-unseal-keys -n vault -o jsonpath='{.data.unseal-key-3}' | base64 -d)

    # Function to unseal a pod
    unseal_pod() {
      POD=$1
      echo "Unsealing $POD..."

      # Check if pod is already unsealed
      if oc exec $POD -n vault -- vault status 2>&1 | grep -q "Sealed.*false"; then
        echo "$POD is already unsealed"
        return 0
      fi

      # Unseal with 3 keys (pass key as argument, not stdin)
      oc exec $POD -n vault -- sh -c "vault operator unseal $UNSEAL_KEY_1" > /dev/null
      oc exec $POD -n vault -- sh -c "vault operator unseal $UNSEAL_KEY_2" > /dev/null
      oc exec $POD -n vault -- sh -c "vault operator unseal $UNSEAL_KEY_3" > /dev/null

      echo "$POD unsealed successfully"
    }

    # Function to join pod to Raft cluster
    join_raft_cluster() {
      POD=$1
      echo "Joining $POD to Raft cluster..."

      # Check if pod is part of the cluster already
      if oc exec vault-0 -n vault -- vault operator raft list-peers 2>&1 | grep -q "$POD"; then
        echo "$POD is already part of the Raft cluster"
        return 0
      fi

      # Join the cluster
      oc exec $POD -n vault -- vault operator raft join http://vault-0.vault-internal:8200 || echo "$POD join attempted"

      echo "$POD joined to Raft cluster"
    }

    # Unseal vault-0
    unseal_pod vault-0

    # Wait for other pods to be running
    echo "Waiting for vault-1 pod to be running..."
    while [ "$(oc get pod vault-1 -n vault -o jsonpath='{.status.phase}' 2>/dev/null)" != "Running" ]; do
      echo "vault-1 pod not running yet, waiting..."
      sleep 5
    done

    echo "Waiting for vault-1 Vault process to be responsive..."
    while true; do
      if oc exec vault-1 -n vault -- vault status 2>/dev/null | grep -q "Seal Type"; then
        echo "vault-1 Vault process is responsive"
        break
      fi
      echo "vault-1 Vault process not responsive yet, waiting..."
      sleep 5
    done

    echo "Waiting for vault-2 pod to be running..."
    while [ "$(oc get pod vault-2 -n vault -o jsonpath='{.status.phase}' 2>/dev/null)" != "Running" ]; do
      echo "vault-2 pod not running yet, waiting..."
      sleep 5
    done

    echo "Waiting for vault-2 Vault process to be responsive..."
    while true; do
      if oc exec vault-2 -n vault -- vault status 2>/dev/null | grep -q "Seal Type"; then
        echo "vault-2 Vault process is responsive"
        break
      fi
      echo "vault-2 Vault process not responsive yet, waiting..."
      sleep 5
    done

    # Join and unseal vault-1
    join_raft_cluster vault-1
    unseal_pod vault-1

    # Join and unseal vault-2
    join_raft_cluster vault-2
    unseal_pod vault-2

    # Verify cluster status (requires authentication, so make it optional)
    echo "=== Verifying Vault Raft Cluster ==="

    # Get root token from secret for verification
    ROOT_TOKEN=$(oc get secret vault-unseal-keys -n vault -o jsonpath='{.data.root-token}' | base64 -d)

    if [ -n "$ROOT_TOKEN" ]; then
      echo "Listing Raft cluster peers..."
      oc exec vault-0 -n vault -- sh -c "VAULT_TOKEN=$ROOT_TOKEN vault operator raft list-peers" || echo "Note: Could not list peers (non-fatal)"
    else
      echo "Note: Root token not available, skipping peer verification"
    fi

    echo "=== Configuring Kubernetes Authentication ==="

    if [ -z "$ROOT_TOKEN" ]; then
      echo "ERROR: Root token not available, cannot configure Kubernetes auth"
      exit 1
    fi

    # Check if Kubernetes auth is already enabled
    if oc exec vault-0 -n vault -- sh -c "VAULT_TOKEN=$ROOT_TOKEN vault auth list" 2>&1 | grep -q "kubernetes/"; then
      echo "Kubernetes auth method is already enabled"
    else
      echo "Enabling Kubernetes auth method..."
      oc exec vault-0 -n vault -- sh -c "VAULT_TOKEN=$ROOT_TOKEN vault auth enable kubernetes"
    fi

    # Configure Kubernetes auth method
    echo "Configuring Kubernetes auth method..."

    # Get the Kubernetes CA cert and service account token from vault-0 pod
    K8S_CA_CERT=$(oc exec vault-0 -n vault -- cat /var/run/secrets/kubernetes.io/serviceaccount/ca.crt)
    K8S_HOST="https://kubernetes.default.svc"

    # Configure the Kubernetes auth method
    oc exec vault-0 -n vault -- sh -c "VAULT_TOKEN=$ROOT_TOKEN vault write auth/kubernetes/config \
      kubernetes_host=\"$K8S_HOST\" \
      kubernetes_ca_cert=\"$K8S_CA_CERT\" \
      disable_local_ca_jwt=false"

    echo "Kubernetes auth method configured successfully"

    # Create policy for Vault Secrets Operator
    echo "Creating policy for Vault Secrets Operator..."

    POLICY_NAME="vault-secrets-operator"
    POLICY_CONTENT='path "secret/*" {
      capabilities = ["read", "list"]
    }
    path "secret/data/*" {
      capabilities = ["read", "list"]
    }
    path "secret/metadata/*" {
      capabilities = ["read", "list"]
    }'

    oc exec vault-0 -n vault -- sh -c "VAULT_TOKEN=$ROOT_TOKEN vault policy write $POLICY_NAME -" <<EOF
$POLICY_CONTENT
EOF

    echo "Policy '$POLICY_NAME' created successfully"

    # Create role for Vault Secrets Operator
    echo "Creating Kubernetes auth role for Vault Secrets Operator..."

    VSO_ROLE="vault-secrets-operator"
    VSO_NAMESPACE="vault-secrets-operator-system"
    VSO_SA="vault-secrets-operator-controller-manager"

    oc exec vault-0 -n vault -- sh -c "VAULT_TOKEN=$ROOT_TOKEN vault write auth/kubernetes/role/$VSO_ROLE \
      bound_service_account_names=$VSO_SA \
      bound_service_account_namespaces=$VSO_NAMESPACE \
      policies=$POLICY_NAME \
      ttl=24h"

    echo "Kubernetes auth role '$VSO_ROLE' created successfully"

    echo "=== Vault initialization and unsealing completed successfully ==="
---
apiVersion: batch/v1
kind: Job
metadata:
  name: vault-init
  namespace: vault
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: vault-init
    spec:
      serviceAccountName: vault-init
      restartPolicy: OnFailure
      containers:
        - name: vault-init
          image: registry.redhat.io/openshift4/ose-cli:latest
          command: ["/bin/sh", "/scripts/init.sh"]
          volumeMounts:
            - name: init-script
              mountPath: /scripts
          env:
            - name: HOME
              value: /tmp
      volumes:
        - name: init-script
          configMap:
            name: vault-init-script
            defaultMode: 0755
