apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argocd-cnpg-cluster-role
  namespace: keycloak
rules:
  - apiGroups: ["postgresql.cnpg.io"]
    resources: ["clusters"]
    verbs: ["*"]
  - apiGroups: [ "k8s.keycloak.org" ]
    resources: [ "keycloaks", "keycloakrealmimports" ]
    verbs: [ "*" ]

