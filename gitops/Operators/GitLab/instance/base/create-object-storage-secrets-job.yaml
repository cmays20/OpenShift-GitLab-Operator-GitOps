apiVersion: v1
kind: ServiceAccount
metadata:
  name: gitlab-secret-creator
  namespace: gitlab-system
  annotations:
    argocd.argoproj.io/sync-wave: "2"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gitlab-secret-creator
  namespace: gitlab-system
  annotations:
    argocd.argoproj.io/sync-wave: "2"
rules:
  - apiGroups: [""]
    resources: ["secrets", "configmaps"]
    verbs: ["get", "list", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gitlab-secret-creator
  namespace: gitlab-system
  annotations:
    argocd.argoproj.io/sync-wave: "2"
subjects:
  - kind: ServiceAccount
    name: gitlab-secret-creator
    namespace: gitlab-system
roleRef:
  kind: Role
  name: gitlab-secret-creator
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: create-gitlab-object-storage-secrets
  namespace: gitlab-system
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  template:
    metadata:
      name: create-gitlab-secrets
    spec:
      serviceAccountName: gitlab-secret-creator
      restartPolicy: OnFailure
      containers:
        - name: create-secrets
          image: registry.redhat.io/openshift4/ose-cli:latest
          command:
            - /bin/bash
            - -c
            - |
              #!/bin/bash
              set -e

              NAMESPACE="gitlab-system"
              S3_ENDPOINT="https://s3.openshift-storage.svc:443"
              S3_ENDPOINT_HTTP="http://s3.openshift-storage.svc:80"
              REGION="us-east-1"

              echo "Creating GitLab object storage secrets from OBC credentials..."

              # Function to create a GitLab object storage secret
              create_gitlab_secret() {
                local obc_secret_name=$1
                local gitlab_secret_name=$2

                echo "Processing $obc_secret_name -> $gitlab_secret_name"

                # Get credentials from OBC secret
                ACCESS_KEY=$(oc get secret "$obc_secret_name" -n "$NAMESPACE" -o jsonpath='{.data.AWS_ACCESS_KEY_ID}' | base64 -d)
                SECRET_KEY=$(oc get secret "$obc_secret_name" -n "$NAMESPACE" -o jsonpath='{.data.AWS_SECRET_ACCESS_KEY}' | base64 -d)

                # Get bucket name from ConfigMap
                BUCKET_NAME=$(oc get configmap "$obc_secret_name" -n "$NAMESPACE" -o jsonpath='{.data.BUCKET_NAME}')

                # Create GitLab-compatible secret
                cat <<EOF | oc apply -f -
              apiVersion: v1
              kind: Secret
              metadata:
                name: $gitlab_secret_name
                namespace: $NAMESPACE
              type: Opaque
              stringData:
                config: |
                  provider: AWS
                  region: $REGION
                  aws_access_key_id: $ACCESS_KEY
                  aws_secret_access_key: $SECRET_KEY
                  endpoint: "$S3_ENDPOINT"
                  path_style: true
              EOF

                echo "✓ Created secret: $gitlab_secret_name"
              }

              # Create secrets for each bucket
              create_gitlab_secret "gitlab-artifacts" "gitlab-artifacts"
              create_gitlab_secret "gitlab-uploads" "gitlab-uploads"
              create_gitlab_secret "gitlab-lfs" "gitlab-lfs"
              create_gitlab_secret "gitlab-packages" "gitlab-packages"
              create_gitlab_secret "gitlab-mr-diffs" "gitlab-mr-diffs"
              create_gitlab_secret "gitlab-ci-secure-files" "gitlab-ci-secure-files"
              create_gitlab_secret "gitlab-dependency-proxy" "gitlab-dependency-proxy"
              create_gitlab_secret "gitlab-terraform-state" "gitlab-terraform-state"
              create_gitlab_secret "gitlab-agent-plan-content" "gitlab-agent-plan-content"
              create_gitlab_secret "gitlab-pages" "gitlab-pages"
              create_gitlab_secret "gitlab-tmp" "gitlab-tmp"
              create_gitlab_secret "runner-cache" "gitlab-runner-cache"

              # Create backups secret (s3cmd format)
              echo "Creating gitlab-backups secret (s3cmd format)..."
              ACCESS_KEY=$(oc get secret "gitlab-backups" -n "$NAMESPACE" -o jsonpath='{.data.AWS_ACCESS_KEY_ID}' | base64 -d)
              SECRET_KEY=$(oc get secret "gitlab-backups" -n "$NAMESPACE" -o jsonpath='{.data.AWS_SECRET_ACCESS_KEY}' | base64 -d)

              cat <<EOF | oc apply -f -
              apiVersion: v1
              kind: Secret
              metadata:
                name: gitlab-backups
                namespace: $NAMESPACE
              type: Opaque
              stringData:
                config: |
                  [default]
                  access_key = $ACCESS_KEY
                  secret_key = $SECRET_KEY
                  host_base = s3.openshift-storage.svc:443
                  host_bucket = s3.openshift-storage.svc:443
                  use_https = True
              EOF

              echo "✓ Created secret: gitlab-backups"

              # Create registry storage secret (different format)
              echo "Creating gitlab-registry-storage secret..."
              ACCESS_KEY=$(oc get secret "registry" -n "$NAMESPACE" -o jsonpath='{.data.AWS_ACCESS_KEY_ID}' | base64 -d)
              SECRET_KEY=$(oc get secret "registry" -n "$NAMESPACE" -o jsonpath='{.data.AWS_SECRET_ACCESS_KEY}' | base64 -d)
              BUCKET_NAME=$(oc get configmap "registry" -n "$NAMESPACE" -o jsonpath='{.data.BUCKET_NAME}')

              cat <<EOF | oc apply -f -
              apiVersion: v1
              kind: Secret
              metadata:
                name: gitlab-registry-storage
                namespace: $NAMESPACE
              type: Opaque
              stringData:
                config: |
                  s3:
                    accesskey: $ACCESS_KEY
                    secretkey: $SECRET_KEY
                    bucket: $BUCKET_NAME
                    region: $REGION
                    regionendpoint: $S3_ENDPOINT_HTTP
                    secure: false
                    v4auth: true
                    pathstyle: true
              EOF

              echo "✓ Created secret: gitlab-registry-storage"

              echo ""
              echo "========================================"
              echo "All GitLab object storage secrets created successfully!"
              echo "========================================"
