apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: cluster-pg-gitlab
  namespace: gitlab-system
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  bootstrap:
    initdb:
      database: gitlab
      owner: gitlab
  walStorage:
    size: 1Gi
  storage:
    size: 50Gi
  instances: 3