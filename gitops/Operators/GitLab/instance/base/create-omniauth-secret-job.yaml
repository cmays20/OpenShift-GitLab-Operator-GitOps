apiVersion: v1
kind: ServiceAccount
metadata:
  name: gitlab-omniauth-creator
  namespace: gitlab-system
  annotations:
    argocd.argoproj.io/sync-wave: "6"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gitlab-omniauth-creator
  namespace: gitlab-system
  annotations:
    argocd.argoproj.io/sync-wave: "6"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gitlab-omniauth-creator
  namespace: gitlab-system
  annotations:
    argocd.argoproj.io/sync-wave: "6"
subjects:
  - kind: ServiceAccount
    name: gitlab-omniauth-creator
    namespace: gitlab-system
roleRef:
  kind: Role
  name: gitlab-omniauth-creator
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: create-gitlab-omniauth-secret
  namespace: gitlab-system
  annotations:
    argocd.argoproj.io/sync-wave: "7"
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  template:
    metadata:
      name: create-omniauth-secret
    spec:
      serviceAccountName: gitlab-omniauth-creator
      restartPolicy: OnFailure
      containers:
        - name: create-secret
          image: registry.redhat.io/openshift4/ose-cli:latest
          command:
            - /bin/bash
            - -c
            - |
              #!/bin/bash
              set -e

              NAMESPACE="gitlab-system"
              KEYCLOAK_URL="https://keycloak.apps.mays-demo.sandbox2671.opentlc.com/realms/gitlab"
              GITLAB_URL="https://gitlab.apps.mays-demo.sandbox2671.opentlc.com"

              echo "Creating GitLab OmniAuth provider secret..."

              # Wait for the OAuth client secret to be available
              echo "Waiting for gitlab-oauth-client-secret to be created by VSO..."
              for i in {1..60}; do
                if oc get secret gitlab-oauth-client-secret -n "$NAMESPACE" >/dev/null 2>&1; then
                  echo "Secret found!"
                  break
                fi
                echo "Waiting... ($i/60)"
                sleep 5
              done

              # Get the client secret from the VSO-synced secret
              CLIENT_SECRET=$(oc get secret gitlab-oauth-client-secret -n "$NAMESPACE" -o jsonpath='{.data.client-secret}' | base64 -d)

              if [ -z "$CLIENT_SECRET" ]; then
                echo "ERROR: Could not retrieve GitLab OAuth client secret"
                exit 1
              fi

              echo "Client secret retrieved successfully"

              # Create the OmniAuth provider configuration
              cat <<EOF | oc apply -f -
              apiVersion: v1
              kind: Secret
              metadata:
                name: gitlab-omniauth-provider
                namespace: $NAMESPACE
              type: Opaque
              stringData:
                provider: |
                  name: openid_connect
                  label: 'Keycloak SSO'
                  icon: 'https://www.keycloak.org/resources/images/keycloak_icon_512px.svg'
                  args:
                    name: openid_connect
                    scope:
                      - openid
                      - profile
                      - email
                      - groups
                    response_type: code
                    issuer: '$KEYCLOAK_URL'
                    client_auth_method: query
                    discovery: true
                    uid_field: preferred_username
                    pkce: true
                    client_options:
                      identifier: gitlab
                      secret: '$CLIENT_SECRET'
                      redirect_uri: '$GITLAB_URL/users/auth/openid_connect/callback'
              EOF

              echo "✓ Created OmniAuth provider secret: gitlab-omniauth-provider"
              echo ""
              echo "========================================"
              echo "GitLab OmniAuth configuration created successfully!"
              echo "========================================"
              echo ""
              echo "To use Keycloak SSO:"
              echo "1. Navigate to $GITLAB_URL"
              echo "2. Click 'Keycloak SSO' button on login page"
              echo "3. Authenticate with Keycloak credentials"
              echo ""
              echo "Note: Keep the root user for emergency access"
