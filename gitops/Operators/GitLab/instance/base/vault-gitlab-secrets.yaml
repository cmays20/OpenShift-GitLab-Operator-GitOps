---
# Sync GitLab OAuth client secret from Vault
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: gitlab-oauth-client-secret
  namespace: gitlab-system
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  vaultAuthRef: vault/vault-auth
  mount: secret
  type: kv-v2
  path: gitlab/oauth-client-secret
  refreshAfter: 30s

  destination:
    name: gitlab-oauth-client-secret
    create: true
---
# Sync GitLab OAuth client secret to Keycloak namespace (for realm import)
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: gitlab-oauth-client-secret
  namespace: keycloak
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  vaultAuthRef: vault/vault-auth
  mount: secret
  type: kv-v2
  path: gitlab/oauth-client-secret
  refreshAfter: 30s

  destination:
    name: gitlab-oauth-client-secret
    create: true
