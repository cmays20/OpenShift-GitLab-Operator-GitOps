apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultAuth
metadata:
  name: vault-auth
  namespace: vault
spec:
  # Reference to VaultConnection
  vaultConnectionRef: vault-connection

  # Allow all namespaces to use this VaultAuth
  allowedNamespaces:
    - "*"

  # Kubernetes authentication method
  method: kubernetes
  mount: kubernetes

  kubernetes:
    # Role created in vault-init job
    role: vault-secrets-operator

    # Use default service account from the namespace where VaultStaticSecret is created
    serviceAccount: default

    # Token audience (optional, but recommended for security)
    audiences:
      - vault
