---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-seed-secrets
  namespace: vault
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vault-seed-secrets
  namespace: vault
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vault-seed-secrets
  namespace: vault
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: vault-seed-secrets
subjects:
  - kind: ServiceAccount
    name: vault-seed-secrets
    namespace: vault
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-seed-secrets-script
  namespace: vault
data:
  seed.sh: |
    #!/bin/sh
    set -e

    echo "=== Vault Secret Seeding Script ==="

    # Wait for vault-0 pod to be ready
    echo "Waiting for vault-0 pod to be ready..."
    while ! oc exec vault-0 -n vault -- vault status 2>&1 | grep -q "Sealed.*false"; do
      echo "Vault not ready yet, waiting..."
      sleep 5
    done

    echo "Vault is ready"

    # Get root token from secret
    echo "Retrieving Vault root token..."
    ROOT_TOKEN=$(oc get secret vault-unseal-keys -n vault -o jsonpath='{.data.root-token}' | base64 -d)

    if [ -z "$ROOT_TOKEN" ]; then
      echo "ERROR: Could not retrieve Vault root token"
      exit 1
    fi

    echo "Root token retrieved successfully"

    # Function to check if secret exists in Vault
    secret_exists() {
      SECRET_PATH=$1
      if oc exec vault-0 -n vault -- sh -c "VAULT_TOKEN=$ROOT_TOKEN vault kv get $SECRET_PATH" >/dev/null 2>&1; then
        return 0
      else
        return 1
      fi
    }

    # Generate and store cmays initial password
    echo "Checking if cmays initial password exists..."
    if secret_exists "secret/keycloak/cmays-initial-password"; then
      echo "cmays initial password already exists, skipping"
    else
      echo "Generating cmays initial password..."
      CMAYS_PASSWORD=$(openssl rand -base64 16)
      echo "Storing cmays initial password in Vault..."
      oc exec vault-0 -n vault -- sh -c "VAULT_TOKEN=$ROOT_TOKEN vault kv put secret/keycloak/cmays-initial-password password='$CMAYS_PASSWORD'"
      echo "cmays initial password stored successfully"
      echo "IMPORTANT: Initial password for user cmays: $CMAYS_PASSWORD"
    fi

    # Generate and store OAuth client secret
    echo "Checking if OAuth client secret exists..."
    if secret_exists "secret/keycloak/openshift-oauth-client-secret"; then
      echo "OAuth client secret already exists, skipping"
    else
      echo "Generating OAuth client secret..."
      OAUTH_CLIENT_SECRET=$(openssl rand -base64 32)

      echo "Storing OAuth client secret for Keycloak..."
      oc exec vault-0 -n vault -- sh -c "VAULT_TOKEN=$ROOT_TOKEN vault kv put secret/keycloak/openshift-oauth-client-secret client-secret='$OAUTH_CLIENT_SECRET'"

      echo "Storing OAuth client secret for OpenShift..."
      oc exec vault-0 -n vault -- sh -c "VAULT_TOKEN=$ROOT_TOKEN vault kv put secret/openshift-config/openshift-oauth-client-secret clientSecret='$OAUTH_CLIENT_SECRET'"

      echo "OAuth client secret stored successfully"
      echo "IMPORTANT: OAuth Client Secret: $OAUTH_CLIENT_SECRET"
    fi

    # Generate and store GitLab OAuth client secret
    echo "Checking if GitLab OAuth client secret exists..."
    if secret_exists "secret/gitlab/oauth-client-secret"; then
      echo "GitLab OAuth client secret already exists, skipping"
    else
      echo "Generating GitLab OAuth client secret..."
      GITLAB_OAUTH_CLIENT_SECRET=$(openssl rand -base64 32)

      echo "Storing GitLab OAuth client secret in Vault..."
      oc exec vault-0 -n vault -- sh -c "VAULT_TOKEN=$ROOT_TOKEN vault kv put secret/gitlab/oauth-client-secret client-secret='$GITLAB_OAUTH_CLIENT_SECRET'"

      echo "GitLab OAuth client secret stored successfully"
      echo "IMPORTANT: GitLab OAuth Client Secret: $GITLAB_OAUTH_CLIENT_SECRET"
    fi

    # List all secrets created
    echo ""
    echo "=== Vault Secret Seeding Completed ==="
    echo ""
    echo "Secrets available in Vault:"
    oc exec vault-0 -n vault -- sh -c "VAULT_TOKEN=$ROOT_TOKEN vault kv list secret/keycloak" || true
    oc exec vault-0 -n vault -- sh -c "VAULT_TOKEN=$ROOT_TOKEN vault kv list secret/openshift-config" || true
    oc exec vault-0 -n vault -- sh -c "VAULT_TOKEN=$ROOT_TOKEN vault kv list secret/gitlab" || true
    echo ""
    echo "VSO will sync these secrets to the appropriate namespaces."
---
apiVersion: batch/v1
kind: Job
metadata:
  name: vault-seed-secrets
  namespace: vault
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: vault-seed-secrets
    spec:
      serviceAccountName: vault-seed-secrets
      restartPolicy: OnFailure
      containers:
        - name: vault-seed-secrets
          image: registry.redhat.io/openshift4/ose-cli:latest
          command: ["/bin/sh", "/scripts/seed.sh"]
          volumeMounts:
            - name: seed-script
              mountPath: /scripts
          env:
            - name: HOME
              value: /tmp
      volumes:
        - name: seed-script
          configMap:
            name: vault-seed-secrets-script
            defaultMode: 0755
