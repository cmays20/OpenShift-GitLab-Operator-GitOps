apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: demo-setup-app-of-apps
  namespace: openshift-gitops
spec:
  destination:
    server: 'https://kubernetes.default.svc'
  project: default
  source:
    path: gitops/ArgoCD-Applications/aggregate
    repoURL: 'https://github.com/cmays20/OpenShift-GitLab-Operator-GitOps.git'
    targetRevision: HEAD
  syncPolicy:
    automated:
      selfHeal: true